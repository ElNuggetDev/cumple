<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Familia ❤️</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Fondo Kame House */
            background-image: url('image_c3c160.png'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            
            font-family: 'Impact', 'Arial Black', sans-serif;
            margin: 0;
            flex-direction: column;
        }
        h1 {
            color: #FFE779; 
            margin-bottom: 20px;
            text-align: center;
            font-size: 36px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px #000000, 5px 5px 0px #D92318;
        }
        /* NUEVO ESTILO PARA EL TEXTO DE ABAJO */
        h2 {
            color: #FFE779; 
            margin-top: 25px; /* Le da un espacio debajo de la foto */
            text-align: center;
            font-size: 30px; /* Un poco más pequeño que el título de arriba */
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px #000000, 5px 5px 0px #D92318;
        }
        #contenedor-regalo {
            position: relative;
            width: 500px;
            height: 500px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); 
            border-radius: 12px;
            overflow: hidden;
            background-image: url('image_366ad.png'); 
            background-size: cover;
            background-position: center;
            background-color: #000000; 
            border: 4px solid #002244; 
        }
        .cuadro {
            position: absolute;
            background: radial-gradient(circle, #FFE779 10%, #E85D04 90%);
            border: 2px solid #9D0208; 
            box-sizing: border-box;
            border-radius: 4px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        
        .activo {
            cursor: pointer;
            animation: palpitarKI 1s infinite; 
        }
        .activo:hover {
            filter: brightness(1.3) contrast(1.2);
            z-index: 10;
        }

        .inactivo {
            cursor: not-allowed;
            opacity: 0.95;
            filter: grayscale(20%);
        }

        .oculto {
            opacity: 0;
            transform: scale(0.3) rotate(45deg); 
            pointer-events: none;
        }

        @keyframes palpitarKI {
            0% { box-shadow: inset 0 0 10px rgba(255,255,255,0.5); }
            50% { box-shadow: inset 0 0 30px rgba(255,255,255,1), 0 0 10px #FFE779; border-color: #FFE779; }
            100% { box-shadow: inset 0 0 10px rgba(255,255,255,0.5); }
        }
    </style>
</head>
<body>

    <h1>Nuestra Familia</h1>
    
    <div id="contenedor-regalo">
        <!-- Los cuadros se generarán aquí -->
    </div>

    <!-- AQUÍ ESTÁ EL TEXTO NUEVO -->
    <h2>Feliz Cumpleaños Chucky</h2>

    <!-- Música de fondo -->
    <audio id="musicaFondo" src="musica.mp3" loop></audio>

    <script>
        const contenedor = document.getElementById('contenedor-regalo');
        const musica = document.getElementById('musicaFondo');
        let musicaIniciada = false;
        
        const filas = 5; 
        const columnas = 5;
        let faseActual = 1;
        let cuadrosPorFase = { 1: 0, 2: 0, 3: 0 };
        
        const anchoCuadro = contenedor.offsetWidth / columnas;
        const altoCuadro = contenedor.offsetHeight / filas;

        for (let i = 0; i < filas; i++) {
            for (let j = 0; j < columnas; j++) {
                const cuadro = document.createElement('div');
                cuadro.classList.add('cuadro');
                
                let faseDelCuadro = 3; 
                if (i === 0 || i === 4 || j === 0 || j === 4) {
                    faseDelCuadro = 1; 
                } else if (i === 1 || i === 3 || j === 1 || j === 3) {
                    faseDelCuadro = 2; 
                }

                cuadro.dataset.fase = faseDelCuadro;
                cuadrosPorFase[faseDelCuadro]++;

                if (faseDelCuadro === 1) {
                    cuadro.classList.add('activo');
                } else {
                    cuadro.classList.add('inactivo');
                }
                
                cuadro.style.width = `${anchoCuadro}px`;
                cuadro.style.height = `${altoCuadro}px`;
                cuadro.style.top = `${i * altoCuadro}px`;
                cuadro.style.left = `${j * anchoCuadro}px`;

                cuadro.addEventListener('click', function() {
                    if (parseInt(this.dataset.fase) !== faseActual || this.classList.contains('oculto')) {
                        return;
                    }

                    this.classList.remove('activo', 'inactivo');
                    this.classList.add('oculto');
                    
                    if (!musicaIniciada) {
                        musica.play().catch(e => console.log("No hay música cargada"));
                        musicaIniciada = true;
                    }

                    cuadrosPorFase[faseActual]--;

                    if (cuadrosPorFase[faseActual] === 0) {
                        faseActual++;
                        const todosLosCuadros = document.querySelectorAll('.cuadro');
                        todosLosCuadros.forEach(c => {
                            if (parseInt(c.dataset.fase) === faseActual) {
                                c.classList.remove('inactivo');
                                c.classList.add('activo');
                            }
                        });
                    }
                });

                contenedor.appendChild(cuadro);
            }
        }
    </script>
</body>
</html>
